name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Build sub-packages
        run: |
          for pkg in src/rules src/executor-verify src/comment-checker src/start-work src/codegraph src/teammode src/lsp src/git-bash src/bootstrap src/ultrawork src/ulw-loop src/telemetry; do
            if [ -f "$pkg/package.json" ] && node -e "const p=require('./$pkg/package.json'); process.exit(p.scripts?.build ? 0 : 1)" 2>/dev/null; then
              echo "Building $pkg..."
              (cd "$pkg" && npm run build --silent) || true
            fi
          done
      - run: bun test

  cli-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run bin/lazy-claudecode --version
      - run: bun run bin/lazy-claudecode --help
      - run: bun run bin/lazy-claudecode doctor
